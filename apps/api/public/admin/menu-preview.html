<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Menu preview · Swiss Bakery</title>
    <link rel="icon" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400;1,500&family=Montserrat:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #f6efe0;
        --ink: #1a2a4f;
        --gold: #c89a2b;
        --gold-soft: #d4a84a;
        --muted: #8a8472;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: #4a4f59;
        color: var(--ink);
        font-family: "Montserrat", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .toolbar {
        position: sticky;
        top: 0;
        z-index: 30;
        background: rgba(11, 20, 38, 0.94);
        color: #fff;
        padding: 10px 16px;
        display: flex;
        gap: 10px;
        justify-content: center;
        align-items: center;
        font-size: 13px;
        backdrop-filter: blur(6px);
      }
      .toolbar span { opacity: 0.85; }
      .toolbar button {
        font: inherit;
        padding: 7px 14px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        background: transparent;
        color: #fff;
        cursor: pointer;
      }
      .toolbar button.primary {
        background: var(--gold);
        color: #1a2a4f;
        border-color: var(--gold);
        font-weight: 700;
      }
      .toolbar button:hover { opacity: 0.92; }
      .stage {
        display: grid;
        place-items: center;
        padding: 28px 16px 80px;
        gap: 24px;
      }
      .page {
        position: relative;
        background: var(--paper);
        width: 210mm;
        min-height: 297mm;
        padding: 18mm 18mm 22mm;
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.28);
      }
      .frame {
        position: absolute;
        inset: 8mm;
        border: 1.5px solid var(--gold);
        pointer-events: none;
      }
      .frame::after {
        content: "";
        position: absolute;
        inset: 2.5mm;
        border: 0.6px solid var(--gold);
      }
      .header {
        position: relative;
        text-align: center;
        padding-top: 4mm;
      }
      .logo {
        width: 26mm;
        height: 26mm;
        margin: 0 auto 4mm;
        border-radius: 50%;
        overflow: hidden;
        background: #fff;
        display: grid;
        place-items: center;
        box-shadow: 0 2px 6px rgba(26, 42, 79, 0.12);
      }
      .logo img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        padding: 1mm;
      }
      .tagline {
        font-family: "Playfair Display", serif;
        font-style: italic;
        color: var(--ink);
        font-size: 13pt;
        margin: 0 0 2mm;
      }
      .strapline {
        color: var(--gold);
        letter-spacing: 0.18em;
        font-size: 8pt;
        font-weight: 600;
      }
      .top-divider {
        margin: 6mm auto 5mm;
        height: 1px;
        background: var(--gold);
        opacity: 0.5;
      }
      .cat {
        position: relative;
        margin: 0 0 7mm;
        page-break-inside: avoid;
        break-inside: avoid;
      }
      .cat-head {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 7mm;
        margin: 2mm 0 1mm;
      }
      .cat-head .rule {
        height: 1px;
        background: var(--gold);
        opacity: 0.55;
      }
      .cat-head h2 {
        font-family: "Playfair Display", serif;
        color: var(--ink);
        font-weight: 700;
        font-size: 17pt;
        margin: 0;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        white-space: nowrap;
      }
      .cat-sub {
        font-family: "Playfair Display", serif;
        font-style: italic;
        color: var(--gold);
        text-align: center;
        font-size: 9pt;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        margin: 0 0 4mm;
      }
      .items {
        display: grid;
        gap: 0.8mm 8mm;
      }
      .items.cols-1 { grid-template-columns: 1fr; }
      .items.cols-2 { grid-template-columns: 1fr 1fr; }
      .items.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
      .items.cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
      .item {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: baseline;
        gap: 4mm;
        padding: 0.7mm 0;
        font-size: 10.5pt;
        page-break-inside: avoid;
        break-inside: avoid;
      }
      .item.with-photo {
        grid-template-columns: 11mm 1fr auto;
        align-items: center;
      }
      .item .thumb {
        width: 11mm;
        height: 11mm;
        background: #fff center / cover no-repeat;
        border: 0.6px solid var(--gold);
        border-radius: 50%;
      }
      .item .name {
        color: var(--ink);
        font-weight: 500;
      }
      .item .price {
        color: var(--gold);
        font-weight: 700;
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
      }
      .item .price.muted {
        color: var(--muted);
        font-style: italic;
        font-weight: 500;
      }
      .footer {
        position: absolute;
        bottom: 12mm;
        left: 18mm;
        right: 18mm;
        text-align: center;
      }
      .footer .note {
        font-family: "Playfair Display", serif;
        font-style: italic;
        color: var(--ink);
        font-size: 10pt;
        margin: 0 0 1.5mm;
      }
      .footer .loc {
        color: var(--gold);
        letter-spacing: 0.22em;
        font-size: 8pt;
        font-weight: 600;
      }
      .footer .loc .star {
        margin: 0 0.6em;
        color: var(--gold);
      }
      .empty {
        text-align: center;
        padding: 3rem 1.5rem;
        color: #fff;
        font-family: "Playfair Display", serif;
        font-style: italic;
      }
      @media print {
        body { background: var(--paper); }
        .toolbar { display: none; }
        .stage { padding: 0; gap: 0; }
        .page {
          box-shadow: none;
          margin: 0;
          page-break-after: always;
          break-after: page;
        }
        .page:last-child {
          page-break-after: auto;
          break-after: auto;
        }
      }
      @page {
        size: A4 portrait;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <span>Use <strong>Save as PDF</strong> in the print dialog.</span>
      <button class="primary" onclick="window.print()">Print / Save as PDF</button>
      <button onclick="window.close()">Close</button>
    </div>
    <div id="stage" class="stage"></div>

    <script>
      const KEY = "sb_menu_preview_v1";
      const fmtPrice = (cents, unit) => {
        if (cents == null) return { text: "ask staff", muted: true };
        const dollars = (cents / 100).toFixed(2).replace(/\.00$/, "");
        const showUnit = unit && unit !== "piece";
        return {
          text: showUnit ? `$${dollars}/${unit}` : `$${dollars}`,
          muted: false,
        };
      };

      const splitIntoPages = (categories) => {
        const pages = [];
        let cur = [];
        for (const cat of categories) {
          if (cat.pageBreakBefore && cur.length > 0) {
            pages.push(cur);
            cur = [];
          }
          cur.push(cat);
        }
        if (cur.length > 0) pages.push(cur);
        return pages.length === 0 ? [[]] : pages;
      };

      const renderItem = (it, showPhoto) => {
        const photo = showPhoto && it.imagePath
          ? `<div class="thumb" style="background-image:url('${it.imagePath.replace(/'/g, "\\'")}')"></div>`
          : (showPhoto ? `<div class="thumb"></div>` : "");
        const p = fmtPrice(it.priceCents, it.unit);
        return `
          <div class="item${showPhoto ? " with-photo" : ""}">
            ${photo}
            <div class="name">${escapeHtml(it.name)}</div>
            <div class="price${p.muted ? " muted" : ""}">${escapeHtml(p.text)}</div>
          </div>`;
      };

      const escapeHtml = (s) =>
        String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]);

      const renderCategory = (cat, globalShowPhotos) => {
        const showPhoto = !!cat.showPhotos || !!globalShowPhotos;
        const cols = cat.columns ?? 2;
        const items = cat.items.map((it) => renderItem(it, showPhoto)).join("");
        const sub = cat.subtitle ? `<p class="cat-sub">${escapeHtml(cat.subtitle)}</p>` : "";
        return `
          <section class="cat">
            <div class="cat-head">
              <div class="rule"></div>
              <h2>${escapeHtml(cat.title)}</h2>
              <div class="rule"></div>
            </div>
            ${sub}
            <div class="items cols-${cols}">${items}</div>
          </section>`;
      };

      const renderPage = (categories, doc, isFirst, isLast) => {
        const header = isFirst
          ? `
            <div class="header">
              <div class="logo"><img src="/swiss_logo.png" alt="Swiss Bakery" onerror="this.style.display='none'" /></div>
              <p class="tagline">${escapeHtml(doc.tagline ?? "")}</p>
              <p class="strapline">${escapeHtml(doc.strapline ?? "")}</p>
            </div>
            <div class="top-divider"></div>`
          : `<div style="height:8mm"></div>`;
        const cats = categories.map((c) => renderCategory(c, doc.showPhotos)).join("");
        const footer = isLast
          ? `
            <div class="footer">
              <p class="note">${escapeHtml(doc.footer ?? "")}</p>
              <div class="loc">${escapeHtml((doc.location ?? "").replace(/·/g, "·"))}</div>
            </div>`
          : "";
        return `
          <article class="page">
            <div class="frame"></div>
            ${header}
            ${cats}
            ${footer}
          </article>`;
      };

      const boot = () => {
        const stage = document.getElementById("stage");
        let raw = null;
        try {
          raw = localStorage.getItem(KEY);
        } catch {}
        if (!raw) {
          stage.innerHTML = `<div class="empty">No menu data found.<br/>Open the Menu builder in admin and click Preview.</div>`;
          return;
        }
        let payload;
        try {
          payload = JSON.parse(raw).payload;
        } catch {
          stage.innerHTML = `<div class="empty">Could not read menu data.</div>`;
          return;
        }
        const { doc, categories } = payload;
        if (!categories || categories.length === 0) {
          stage.innerHTML = `<div class="empty">No products selected.<br/>Tick at least one product in the Menu builder.</div>`;
          return;
        }
        const pages = splitIntoPages(categories);
        stage.innerHTML = pages
          .map((cats, i) => renderPage(cats, doc, i === 0, i === pages.length - 1))
          .join("");
        // Auto-open print dialog after fonts settle.
        const trigger = () => setTimeout(() => window.print(), 600);
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(trigger).catch(trigger);
        } else {
          trigger();
        }
      };
      boot();
    </script>
  </body>
</html>
